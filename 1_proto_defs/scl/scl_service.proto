syntax = "proto3";

package btc_genz.scl;

option go_package = "btc_genz/proto";

import "transaction/transaction.proto";
import "consensus/consensus.proto";

message Empty {}

message GenericResponse {
    bool success = 1;
    string error_msg = 2;
}

message StringResponse {
    string value = 1;
}

message InitRequest {
    string db_path = 1;
}

message BalanceRequest {
    bytes address = 1;
}

message BalanceResponse {
    uint64 balance = 1;
}

message NonceRequest {
    bytes address = 1;
}

message NonceResponse {
    uint64 nonce = 1;
}

message HashResponse {
    bytes hash = 1;
}

message HashRequest {
    bytes hash = 1;
}

message TxStatusResponse {
    uint64 height = 1;
    uint32 status = 2;
    bool is_finalized = 3;
    uint64 confirmations = 4;
    uint64 sender_prev_balance = 5;
    uint64 sender_post_balance = 6;
    uint64 receiver_prev_balance = 7;
    uint64 receiver_post_balance = 8;
}

message BytesRequest {
    bytes data = 1;
}

message BytesResponse {
    bytes data = 1;
}

message MultiBytesResponse {
    repeated bytes data = 1;
}

message SignatureCheckRequest {
    bytes address = 1;
    bytes message = 2;
    bytes signature = 3;
}

message Uint64Request {
    uint64 value = 1;
}

message Uint64Response {
    uint64 value = 1;
}

message Int32Response {
    int32 value = 1;
}

message BoolRequest {
    bool value = 1;
}

message BoolResponse {
    bool value = 1;
}

message SclBlockExecutionRequest {
    bytes body_raw = 1;
    bytes miner_address = 2;
    bytes parent_hash = 3;
    uint64 height = 4;
    bool is_simulation = 5;
    uint64 timestamp = 6;
    bytes header_hash = 7; // [SECURITY-FIX] Pass Header Hash for Checkpoint
    bytes tx_root = 8;     // [VANGUARD-FIX] Pass TxRoot for independent verification
}

message SclBlockExecutionResponse {
    bytes state_root = 1;
    bool success = 2;
    string error_msg = 3;
    int32 failing_tx_index = 4;
    bytes data = 5; // [VANGUARD-FIX] Match Go logic
}

message CommitHashRequest {
    uint64 height = 1;
    bytes hash = 2;
}

message RollbackRequest {
    uint64 current_height = 1;
    uint64 target_height = 2;
}

message DifficultyRequest {
    repeated uint64 timestamps = 1;
    repeated bytes difficulties = 2;
    uint64 current_ts = 3;
    uint64 height = 4;
}

message VerifyPowRequest {
    bytes header_hash = 1;
    uint64 nonce = 2;
    uint64 height = 4;
    uint64 timestamp = 5;
    bytes header_bytes = 6; // [VANGUARD-FIX] Match Go logic
    bytes difficulty = 7;   // [VANGUARD-FIX] Match Go logic
}

message VerifyPowResponse {
    bool is_valid = 1;
    int32 result = 2; // [VANGUARD-FIX] Match Go logic (int32 return)
}

message DifficultySimpleRequest {
    uint64 height = 1;
    uint64 timestamp = 2;
}

message CheckpointRequest {
    uint64 height = 1;
    bytes hash = 2;
}

message MerkleRootRequest {
    bytes flat_hashes = 1;
}

message WeightRequest {
    bytes parent_weight = 1;
    bytes difficulty = 2;
}

message CalculateBlake3HashRequest {
    bytes data = 1;
    uint64 height = 2;
}


message ShortIdRequest {
    bytes tx_hash = 1;
    uint64 nonce = 2;
}

message ReconstructionRequest {
    bytes expected_tx_root = 1;
    repeated bytes tx_hashes = 2;
}

message TimestampFirewallRequest {
    uint64 timestamp = 1;
    uint64 median_time_past = 2; // Quy tắc MTP-11 chống Time-Warp Attack
    uint64 current_now = 3;
}

message SnapshotRequest {
    bytes data = 1;
    uint64 version = 2;
}



message NanoFeeRequest {
    uint64 amount = 1;
    uint32 weight = 2;
}

message PurgeRequest {
    uint64 start_height = 1;
    uint64 end_height = 2;
}

message CalculateSigningHashRequest {
    btc_genz.transaction.Transaction transaction = 1;
    uint64 height = 2;
}

message CalculateTxHashRequest {
    btc_genz.transaction.Transaction transaction = 1;
    uint64 height = 2;
    bytes data = 3; // [VANGUARD-FIX] Match Go logic
}


message SaveBlockRequest {
    uint64 height = 1;
    bytes hash = 2;
    bytes data = 3;
    bool is_canonical = 4;
    bytes weight = 5;
}

message SignRequest {
    bytes data = 1;
    bytes private_key = 2;
}

message SignResponse {
    bytes signature = 1;
    bool success = 2;
    string error_msg = 3;
}

message PrepareTxRequest {
    bytes sender = 1;
    bytes receiver = 2;
    uint64 amount = 3;
    uint64 fee = 4;
    uint64 nonce = 5;
    bytes private_key = 6;
    bytes recent_block_hash = 7;
    uint64 height = 8;
}

message MempoolEntry {
    bytes tx_hash = 1;
    bytes tx_raw = 2;
}

message MempoolEntriesResponse {
    repeated MempoolEntry entries = 1;
}

message RemoveBatchFromMempoolRequest {
    repeated bytes hashes = 1;
}

message TrackedTx {
  bytes tx_id = 1;
  bytes sender = 2;
  bytes receiver = 3;
  uint64 amount = 4;
  uint64 fee = 5;
  int64 timestamp = 6;
  uint64 block_height = 7;
  uint64 nonce = 8;
  uint32 status = 9;
  bool is_finalized = 10;
  uint64 confirmations = 11;
  string error_message = 12;
  uint64 sender_prev_balance = 13;
  uint64 sender_post_balance = 14;
  uint64 receiver_prev_balance = 15;
  uint64 receiver_post_balance = 16;
}

message TransactionsResponse {
  repeated TrackedTx transactions = 1;
}

message AddressRequest {
  bytes address = 1;
}

message ConfigResponse {
  bytes data = 1;
}

message ConfigRequest {
  bytes data = 1;
}

message EvaluateHeaderChainRequest {
    repeated bytes headers_raw = 1; // Danh sách các block header (được serialize thành bytes)
}

message EvaluateHeaderChainResponse {
    uint32 status = 1; // 0 = Heavier, 1 = Lighter, 2 = Invalid
    uint64 fork_point = 2; // Điểm rẽ nhánh cần Rollback nếu là Heavier
    string error_msg = 3;
}

message ProcessNewBlockRequest {
    bytes block_raw = 1; // Toàn bộ dữ liệu khối (bao gồm Header và Body)
}

message ProcessNewBlockResponse {
    uint32 status = 1; // 0 = Accepted, 1 = Rejected, 2 = Orphan
    string error_msg = 2;
}


message SnapshotPathRequest {
    string path = 1;
    uint64 version = 2;
}

message MaturingReward {
    uint64 amount = 1;
    uint64 height = 2;
}

message AccountSnapshot {
    bytes address = 1;
    uint64 balance = 2;
    uint64 nonce = 3;
    uint32 nano_weight = 4;
    repeated MaturingReward maturing_rewards = 5;
    bytes coin_id = 6; // [VANGUARD-FIX] Match Mempool []byte expectation
    uint64 last_full_cleanup = 7;
}


message ValidateTxBatchRequest {
    repeated bytes raw_txs = 1;
}

message TxValidationResult {
    bytes tx_hash = 1;
    bool is_valid = 2;
    uint32 status_code = 3;
    string error_msg = 4;
}

message ValidateTxBatchResponse {
    repeated TxValidationResult results = 1;
}

message BatchTxStatusRequest {
    repeated bytes hashes = 1;
}

message TxStatusEntry {
    bytes hash = 1;
    uint64 height = 2;
    uint32 status = 3;
    bool is_finalized = 4;
    uint64 confirmations = 5;
    uint64 sender_prev_balance = 6;
    uint64 sender_post_balance = 7;
    uint64 receiver_prev_balance = 8;
    uint64 receiver_post_balance = 9;
}

message BatchTxStatusResponse {
    repeated TxStatusEntry statuses = 1;
}

message BatchBalanceRequest {
    repeated bytes addresses = 1;
}

message BalanceEntry {
    bytes address = 1;
    uint64 balance = 2;
    uint64 nonce = 3;
}

message BatchBalanceResponse {
    repeated BalanceEntry balances = 1;
}

message BatchTxHashRequest {
    repeated bytes raw_txs = 1;
    uint64 height = 2;
}

message BatchTxHashResponse {
    repeated bytes hashes = 1;
}

message CoreEvent {
    enum EventType {
        UNKNOWN = 0;
        SECURITY_ALERT = 1;     // Ví dụ: Phát hiện khối vi phạm tường lửa ngầm
        ROCKSDB_WARNING = 2;    // Ví dụ: Ổ cứng sắp đầy, hoặc DB đang Compaction nặng
        SYSTEM_PANIC = 3;       // Cảnh báo sập nguồn nội bộ
        TX_POOL_CONGESTION = 4; // Mempool phía Rust báo động nghẽn
    }
    
    EventType type = 1;
    string message = 2;
    uint64 timestamp = 3;
    bytes payload = 4;          // Dữ liệu đính kèm tùy chọn (ví dụ: Hash kẻ tấn công)
}

service SclService {
    rpc InitScl(InitRequest) returns (GenericResponse);
    rpc GetBalance(BalanceRequest) returns (BalanceResponse);
    rpc GetNonce(NonceRequest) returns (NonceResponse);
    rpc GetAccountState(BalanceRequest) returns (AccountSnapshot);
    rpc GetStateRoot(Empty) returns (HashResponse);
    rpc GetSpendableBalance(BalanceRequest) returns (BalanceResponse);
    rpc GetFinalizedHeight(Empty) returns (Uint64Response);
    rpc SetFinalizedHeight(Uint64Request) returns (GenericResponse);
    rpc ForceSetFinalizedHeight(Uint64Request) returns (GenericResponse);
    rpc GetCurrentVersion(Empty) returns (Uint64Response);
    rpc GetTransactionStatus(HashRequest) returns (TxStatusResponse);
    
    rpc ExecuteBlock(SclBlockExecutionRequest) returns (SclBlockExecutionResponse);
    rpc BuildVanguardBlockTemplate(BytesRequest) returns (BytesResponse);
    rpc CommitBlockHash(CommitHashRequest) returns (GenericResponse);
    rpc RollbackState(RollbackRequest) returns (GenericResponse);
    // [BÀN TAY VÔ HÌNH] Xóa khối vật lý — bỏ qua Tường lửa Bất biến (Chỉ localhost + mã 01900)
    rpc ForceDeleteBlocks(RollbackRequest) returns (GenericResponse);
    rpc VerifySignature(SignatureCheckRequest) returns (BoolResponse);
    
    rpc CalculateNextDifficulty(DifficultyRequest) returns (BytesResponse);
    rpc VerifyPow(VerifyPowRequest) returns (VerifyPowResponse);
    rpc GetHashrate(Empty) returns (Uint64Response);
    rpc CalculateAbsoluteWeight(WeightRequest) returns (BytesResponse);
    rpc DebugDumpSmtNodes(Empty) returns (StringResponse);
    
    // [VANGUARD-MINING-V2] Cơ chế đào không chặn (Asynchronous Mining)
    rpc StartMiningV2(BytesRequest) returns (GenericResponse);
    rpc GetMiningResult(Empty) returns (btc_genz.consensus.MiningResult);
    rpc SubmitMiningTask(BytesRequest) returns (GenericResponse);
    rpc SetMiningPause(BoolRequest) returns (GenericResponse);
    
    // [VANGUARD-NETWORK-OPTIMIZATION] 112-byte Raw Header Streaming
    rpc PackHeaderV112(BytesRequest) returns (BytesResponse);
    rpc UnpackHeaderV112(BytesRequest) returns (BytesResponse);

    rpc IsMiningPaused(Empty) returns (BoolResponse);
    
    rpc CalculateShortTxId(ShortIdRequest) returns (Uint64Response);
    rpc VerifyBlockReconstruction(ReconstructionRequest) returns (BoolResponse);
    rpc VerifyTimestampFirewall(TimestampFirewallRequest) returns (BoolResponse);
    rpc IsNewWalletDetailed(BalanceRequest) returns (BoolResponse); // [VANGUARD-FIX]
    rpc ImportStateSnapshot(SnapshotRequest) returns (SclBlockExecutionResponse);

    
    rpc CalculateExpectedSupply(Uint64Request) returns (Uint64Response);
    rpc SetExpectedSupply(Uint64Request) returns (GenericResponse);
    rpc CalculateActualTotalSupply(Empty) returns (Uint64Response);
    rpc GetActualTotalSupply(Empty) returns (Uint64Response);
    rpc ExportStateSnapshot(Empty) returns (BytesResponse);
    rpc ExportStateSnapshotAtHeight(Uint64Request) returns (BytesResponse);
    rpc GetAddressType(BytesRequest) returns (Int32Response);
    rpc IsValidFee(Uint64Request) returns (BoolResponse);
    rpc CalculateNanoFee(NanoFeeRequest) returns (Uint64Response);
    rpc GetNanoWeight(BytesRequest) returns (Uint64Response);
    
    rpc CalculateTxHash(BytesRequest) returns (BytesResponse);
    rpc CalculateTxHashWithHeight(CalculateTxHashRequest) returns (BytesResponse);
    rpc CalculateSigningHash(CalculateSigningHashRequest) returns (BytesResponse);
    rpc CalculateBlockHeaderHash(BytesRequest) returns (BytesResponse);
    rpc GetHeaderRaw(BytesRequest) returns (BytesResponse);
    rpc CalculateMerkleRoot(MerkleRootRequest) returns (BytesResponse);
    rpc CalculateBlockRewardBtcZ(Uint64Request) returns (Uint64Response);
    rpc CalculateBlake3HashWithHeight(CalculateBlake3HashRequest) returns (BytesResponse);
    
    rpc GetOldestHeight(Empty) returns (Uint64Response);
    rpc GetMedianTimePast(Uint64Request) returns (Uint64Response);
    rpc GetBlockRaw(Uint64Request) returns (BytesResponse);
    rpc GetBlockHash(Uint64Request) returns (BytesResponse);
    rpc GetRawByHash(BytesRequest) returns (BytesResponse);
    rpc SaveBlockRaw(SaveBlockRequest) returns (BoolResponse);
    
    rpc PurgeHistoricalData(BytesRequest) returns (GenericResponse);
    rpc EmergencyStateRebuild(Uint64Request) returns (GenericResponse);
    
    rpc EvaluateHeaderChain(EvaluateHeaderChainRequest) returns (EvaluateHeaderChainResponse);
    rpc ProcessNewBlock(ProcessNewBlockRequest) returns (ProcessNewBlockResponse);
    rpc ProcessChain(btc_genz.consensus.SyncChainRequest) returns (btc_genz.consensus.SyncChainResponse);
    
    rpc ImportStateSnapshotPath(SnapshotPathRequest) returns (BytesResponse);
    rpc AuthoritativeSign(SignRequest) returns (SignResponse);
    rpc PrepareTransaction(PrepareTxRequest) returns (btc_genz.transaction.Transaction);
    rpc DeleteByHash(HashRequest) returns (GenericResponse);
    
    rpc AddToMempool(MempoolEntry) returns (GenericResponse);
    rpc AddBatchToMempool(MempoolEntriesResponse) returns (GenericResponse);
    rpc RemoveFromMempool(HashRequest) returns (GenericResponse);
    rpc RemoveFromMempoolBatch(RemoveBatchFromMempoolRequest) returns (GenericResponse);
    rpc GetMempoolEntries(Empty) returns (MempoolEntriesResponse);
    rpc GetTransactionsByAddress(AddressRequest) returns (TransactionsResponse);
    rpc GetNodeConfig(Empty) returns (ConfigResponse);
    rpc SetNodeConfig(ConfigRequest) returns (GenericResponse);

    rpc ReindexMinerHistory(AddressRequest) returns (GenericResponse);
    rpc ClearStagingArea(Empty) returns (GenericResponse);

    rpc ResetStateCompletely(Empty) returns (GenericResponse);
    rpc GetHighestBlockHeight(Empty) returns (Uint64Response);
    rpc ValidateTransactionBatch(ValidateTxBatchRequest) returns (ValidateTxBatchResponse);
    rpc GetTransactionStatusBatch(BatchTxStatusRequest) returns (BatchTxStatusResponse);
    rpc GetBalanceBatch(BatchBalanceRequest) returns (BatchBalanceResponse);
    rpc CalculateTxHashesBatch(BatchTxHashRequest) returns (BatchTxHashResponse);

    // [VANGUARD-EVENT] Luồng thứ 7: Kênh nghe báo động đỏ từ Rust Core
    rpc WatchCoreEvents(Empty) returns (stream CoreEvent);
}
