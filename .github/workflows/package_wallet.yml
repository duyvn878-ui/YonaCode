name: Build and Package Web Wallet (APK & EXE)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: 7_user_wallet/package-lock.json

      - name: Install Dependencies
        run: |
          cd 7_user_wallet
          npm install

      - name: Build Web App and Package Windows EXE
        run: |
          cd 7_user_wallet
          npm run build
          npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YonaWallet-Windows-EXE
          path: 7_user_wallet/dist-electron/*.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: 7_user_wallet/package-lock.json

      - name: Install Dependencies
        run: |
          cd 7_user_wallet
          npm install

      - name: Build Web App and Sync to Capacitor
        run: |
          cd 7_user_wallet
          npm run build
          npx cap sync

      - name: Build Android APK
        run: |
          cd 7_user_wallet/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YonaWallet-Android-APK
          path: 7_user_wallet/android/app/build/outputs/apk/debug/app-debug.apk
