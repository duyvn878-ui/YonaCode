# =====================================================================
# YonaCode GPU Miner HiveOS Manifest Configuration
# Feature: Declarative variables for HiveOS Custom Miner Integration
# Date: 2026-07-23
# =====================================================================

# Tên nhận diện của Custom Miner trong hệ thống HiveOS
CUSTOM_NAME=yona_gpu_miner

# Phiên bản phát hành của miner
CUSTOM_VERSION=1.0.0

# Thuật toán khai thác mặc định
CUSTOM_ALGO=blake3

# Thư mục chứa file chạy mặc định
CUSTOM_BIN_PATH="yona_gpu_miner"

# Đường dẫn tệp ghi nhật ký cơ bản của thợ đào (Thư mục log của HiveOS)
CUSTOM_LOG_BASENAME=/var/log/miner/custom/$CUSTOM_NAME
